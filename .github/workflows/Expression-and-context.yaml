name: Expression and Context
on: [push, pull_request, issues, workflow_dispatch]

jobs:
  expression-and-context:
    runs-on: ubuntu-latest
    steps:
      - name: Display Context Information
        id: expression
        run: |
          echo ${{1}}
          echo ${{'This is a String Expression'}}
          echo ${{null}}
          echo ${{true}}
          echo ${{1>2}}
          echo ${{'string' == 'String'}}
          echo ${{true && false}}
          echo ${{true || (false && true)}}

      - name: Dump Context   
        run: |
           echo '${{ toJson(github) }}' # Dumping the entire github context as a JSON string
           echo '${{ toJson(job) }}'    # Dumping the entire env context as a JSON string
           echo '${{ toJson(runner) }}' # Dumping the entire inputs context as a JSON string
           echo '${{ toJson(secrets) }}' # Dumping the entire secrets context as a JSON string
