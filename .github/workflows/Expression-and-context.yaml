name: Expression and Context
on: [push, pull_request, issues, workflow_dispatch]
run-name: "Expression and Context by @${{ github.actor }} , event: ${{ github.event_name }} "
jobs:
  run-on-issues-and-prs:
    runs-on: ubuntu-latest
    if: contains(fromJson('["issues", "pull_request"]'), github.event_name) # This job will only run for issues and pull request events
    # if: ${{ github.event_name == 'issues' || github.event_name == 'pull_request' }} # This job will only run for issues and pull request events 
    steps:
       - name: Run only if an issue has a bug label
         if: contains(github.event.issue.labels.*.name, 'bug') # This step will only run if the issue has a label named 'bug'
         run: echo ${{ join(github.event.issue.labels.*.name, ', ')}}

  expression-and-context:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }} # This job will only run for push events
    steps:
      - name: Display Context Information
        id: expression
        run: |
          echo ${{1}}
          echo ${{'This is a String Expression'}}
          echo ${{null}}
          echo ${{true}}
          echo ${{1>2}}
          echo ${{'string' == 'String'}}
          echo ${{true && false}}
          echo ${{true || (false && true)}}

      - name: Dump Context   
        run: |
           echo '${{ toJson(github) }}' # Dumping the entire github context as a JSON string
           echo '${{ toJson(job) }}'    # Dumping the entire env context as a JSON string
           echo '${{ toJson(runner) }}' # Dumping the entire inputs context as a JSON string
           echo '${{ toJson(secrets) }}' # Dumping the entire secrets context as a JSON string
