name: Status Check Functions
on: [push]

jobs: 
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: Run a command and check its status
              run: sleep 20
            - name: Runs On Failure
              if: failure()     # This step will only run if the previous step fails
              run: echo "The previous step failed. Running this step." 
            - name: Runs On Success
            # this is not needed as the default behavior is to run the next step if the previous step succeeds, but it's added here for clarity
              if: success()     # This step will only run if the previous step succeeds
              run: echo "The previous step succeeded. Running this step."   
            - name: Runs On Always
             # if: success() || failure()  # This step will run regardless of the previous step's outcome
              
              if: always()      # This step will run regardless of the previous step's outcome
              run: echo "This step runs regardless of the previous step's success or failure." 
              
            - name: Runs On Cancelled
              if: cancelled()    # This step will only run if the workflow run is cancelled
              run: echo "The workflow run was cancelled. Running this step."  

    job-2:
        runs-on: ubuntu-latest  
        needs: job-1
        if: failure()   
        steps:
            - name: This job runs only if job-1 fails
              run: echo "Job-1 failed, so this job-2 is running."   
