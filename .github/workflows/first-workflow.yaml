name: First Workflow
on: [push]

jobs:
  run-shell-commands:
    runs-on: ubuntu-latest
    steps:
      - name: echo a string 
        run: echo "Hello World"
      - name: Multiple Commands
        run: |
          node -v
          npm -v
  Parallel-job-macos:
    runs-on: macos-latest
    steps:
      - name: View SW Version 
        run: sw_vers
      

  dependent-job:
    runs-on: windows-latest
    needs: run-shell-commands
    steps:
      - name: echo a string 
        run: echo "This job runs after the first two jobs are completed"
      - name: Error step
        run: doesnotexist  