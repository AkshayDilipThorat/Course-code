name: Calling Reusable Workflows
on: 
  workflow_dispatch:
   inputs:
    name: 
       description: "Input description"
       type: string
       default: "Akshay"
       required: false
jobs: 
  calling-a-reusable-wf:
    uses: AkshayDilipThorat/workflow/.github/workflows/Reusable.yaml@main
    with: 
      name: ${{inputs.name}}
    secrets:
      access-token: ${{secrets.ACCESS_TOKEN}}

  
