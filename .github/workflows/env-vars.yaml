name: Environment Variables
on: [push]
env:
    WF_LEVELENV: Available to all jobs and steps in the workflow
jobs:
  display-env-vars-and-context:
    runs-on: ubuntu-latest
    # if: $GITHUB_REF == 'refs/heads/main'  DON'T DO THIS
    if: github.ref == 'refs/heads/main'
    env:
      JOB_LEVEL_ENV: Available to all steps in this job
    steps:
      - name: Log ENV Variables
        run: echo $GITHUB_REF
      - name: Log Context
        run: echo '${{ github.ref }}' 
      - name: Set ENV VAR in Step
        run: |
           echo "NEW_ENV_VAR=$(date)" >> "$GITHUB_ENV"
           echo "JOB_LEVEL_ENV=$RANDOM" >> "$GITHUB_ENV"
      - name: Multiline ENV vars
        run: |
         DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
         echo "RANDOM_JOKE<<$DELIMITER" >> "$GITHUB_ENV" 
         echo "Here is a joke: " >> "$GITHUB_ENV"
           curl -s https://icanhazdadjoke.com/ >> "$GITHUB_ENV"
           echo "">> "$GITHUB_ENV"  
         echo "$DELIMITER" >> "$GITHUB_ENV"
      - name: Log custom ENV Vars
        env:
            STEP_LEVEL_ENV: Available only in this step
            WF_LEVEL_ENV: Overridden in this step
        run: |
          echo '${{env.STEP_LEVEL_ENV}}'
          echo $WF_LEVEL_ENV
          echo $JOB_LEVEL_ENV 
          echo $NEW_ENV_VAR 
          echo $RANDOM_JOKE