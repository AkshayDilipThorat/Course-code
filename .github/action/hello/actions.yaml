name: Hello world
author: Akshay AkshayDilipThorat
description: "Greet someone and record the time"
inputs: 
  who_to_greet:
    description: "Who to greet"
    required: true
    default: "World"

  outputs:
    time:
      description: The time of the Greeting
  runs: 
    using: "node16"
    main: index.js  
    pre: 'setup.js'
    pre-if: runner.os == 'linus'
    post: 'cleanup.js'
    post-if: runner.os == 'linus'
